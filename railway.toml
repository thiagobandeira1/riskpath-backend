# Railway service config. Auto-detected on every push to the connected branch.
#
# - We rely on the Dockerfile for build (Nixpacks is skipped when a Dockerfile
#   is present at the repo root).
# - Health check path matches the FastAPI /health endpoint.
# - Restart policy: ON_FAILURE with a small max so a broken deploy fails loud
#   instead of silently retrying forever.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Intentionally NO startCommand here — Railway would pass it directly to
# the container without shell expansion, so `${PORT:-8000}` arrives as a
# literal string and uvicorn rejects it ("Invalid value for '--port'").
# The Dockerfile's CMD uses `sh -c` which DOES expand ${PORT}, and Railway
# falls back to the Dockerfile CMD when startCommand is omitted.
healthcheckPath = "/health"
# Generous timeout for the first /health hit: lifespan loads the predictor
# (~3 s) + pre-builds the SHAP TreeExplainer (~50 ms) before the app
# accepts traffic. 60 s leaves headroom for cold parquet I/O on slow disks.
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
